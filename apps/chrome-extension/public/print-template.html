<!DOCTYPE html>
<!--
  KotobaFlow AI — Print-Engine Template

  This is a standalone HTML page opened by the background service worker
  in a new tab when the user selects "Prepare for Print" from the
  right-click context menu.

  Data flow:
    1. Background worker calls Genkit API, stores { text, tokens }
       in chrome.storage.session under key "printData".
    2. Opens this page via chrome.tabs.create().
    3. On load, the inline script reads chrome.storage.session.get('printData')
       and renders <ruby> annotations.
    4. Triggers window.print() on a 300ms delay to allow CSS layout to settle.
    5. On afterprint, closes the tab.

  This approach bridges Google Docs' canvas limitation — the print template
  renders native HTML <ruby> that the browser's print engine understands.
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KotobaFlow — Furigana Print Sheet</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", "MS PMincho", serif;
    font-size: 14pt;
    line-height: 2.2;
    color: #1a1a1a;
    padding: 20mm 25mm;
    background: #fff;
  }

  header {
    text-align: center;
    padding-bottom: 12mm;
    border-bottom: 2px solid #e5e7eb;
    margin-bottom: 12mm;
  }

  header h1 {
    font-size: 18pt;
    font-weight: 700;
    letter-spacing: 2px;
    color: #4F46E5;
  }

  header p {
    font-size: 10pt;
    color: #6b7280;
    margin-top: 2mm;
  }

  #content {
    font-size: 16pt;
    line-height: 3;
    word-spacing: 0.15em;
  }

  ruby {
    ruby-position: over;
    ruby-align: center;
  }

  rt {
    font-size: 0.5em;
    color: #4F46E5;
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  .particle {
    color: #9ca3af;
  }

  .no-reading {
    color: #374151;
  }

  footer {
    text-align: center;
    margin-top: 20mm;
    padding-top: 8mm;
    border-top: 1px solid #e5e7eb;
    font-size: 9pt;
    color: #9ca3af;
  }

  @media print {
    html, body {
      margin: 0;
      padding: 0;
      background: #fff;
    }

    body {
      padding: 15mm 20mm;
    }

    header {
      border-bottom-color: #d1d5db;
    }

    rt {
      color: #6b7280;
    }

    @page {
      margin: 20mm 25mm;
      size: A4 portrait;
    }
  }

  #loading {
    text-align: center;
    padding: 40mm 0;
    color: #6b7280;
    font-size: 12pt;
  }

  .spinner {
    display: inline-block;
    width: 24px;
    height: 24px;
    border: 3px solid #e5e7eb;
    border-top-color: #4F46E5;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div>Preparing print layout…</div>
  </div>

  <div id="app" style="display:none">
    <header>
      <h1>KotobaFlow AI</h1>
      <p>Furigana Print Sheet</p>
    </header>

    <main id="content"></main>

    <footer>
      <p>Generated by KotobaFlow AI — 言葉フロー</p>
    </footer>
  </div>

<script>
(function () {
  'use strict';

  function escapeHtml(text) {
    var map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return text.replace(/[&<>"']/g, function (c) { return map[c] || c; });
  }

  chrome.storage.session.get('printData', function (result) {
    var printData = result.printData;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    if (!printData || !printData.tokens || printData.tokens.length === 0) {
      document.getElementById('content').textContent =
        'No text data available. Select Japanese text in Google Docs and try again.';
      return;
    }

    var html = '';
    for (var i = 0; i < printData.tokens.length; i++) {
      var token = printData.tokens[i];

      if (token.pitchAccent && token.pitchAccent.reading && token.surface !== token.pitchAccent.reading) {
        html += '<ruby>' + escapeHtml(token.surface) + '<rt>' + escapeHtml(token.pitchAccent.reading) + '</rt></ruby>';
      } else if (token.isParticle) {
        html += '<span class="particle">' + escapeHtml(token.surface) + '</span>';
      } else {
        html += '<span class="no-reading">' + escapeHtml(token.surface) + '</span>';
      }
    }

    document.getElementById('content').innerHTML = html;

    // Clean up session storage and trigger print
    chrome.storage.session.remove('printData');

    setTimeout(function () {
      window.print();
    }, 300);
  });

  // Close tab after print dialog is dismissed
  window.addEventListener('afterprint', function () {
    window.close();
  });
})();
</script>
</body>
</html>
